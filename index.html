    *{box-sizing:border-box}body{margin:0;background:var(--soft);font-family:Arial,Helvetica,sans-serif;color:var(--text)}.wrap{max-width:1450px;margin:auto;padding:24px}.card{background:#fff;border:1px solid var(--line);border-radius:22px;box-shadow:0 8px 22px rgba(7,53,74,.05)}
    header{padding:24px;display:flex;justify-content:space-between;gap:18px;align-items:center}.logo{font-size:34px;color:var(--navy);letter-spacing:.2em;font-weight:300;text-transform:lowercase}h1{margin:8px 0 2px;font-size:28px}.muted{color:var(--muted)}button{cursor:pointer}.btn{border:1px solid var(--line);background:#fff;border-radius:12px;padding:10px 14px;font-weight:700}.btn.primary{background:var(--navy);border-color:var(--navy);color:#fff}.btn.active{background:var(--navy);color:#fff}.tabs{padding:12px;display:flex;justify-content:space-between;gap:10px;align-items:center}.row{display:flex;gap:10px;flex-wrap:wrap}.grid{display:grid;gap:12px}.metrics{grid-template-columns:repeat(8,1fr)}.metric{border:1px solid var(--line);border-radius:16px;padding:12px;background:#fff}.metric small{display:block;color:var(--muted);font-weight:700}.metric b{font-size:23px;display:block;margin-top:3px}.controls{padding:18px;grid-template-columns:220px 1fr 340px;align-items:end}label span{display:block;font-size:13px;font-weight:700;margin-bottom:6px}input,select,textarea{width:100%;border:1px solid var(--line);border-radius:12px;padding:10px;background:#fff}.notice{background:#FFF8E8;border:1px solid #F0DCA6;color:#6B4A00;border-radius:14px;padding:12px;grid-column:1/-1}.page{display:none}.page.active{display:block}.stack{display:flex;flex-direction:column;gap:20px}
    .yard{padding:18px}.yardHead{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px}.yardWrap{border:1px solid var(--line);border-radius:18px;overflow:hidden}.yardScroll{overflow-x:auto}.yardCanvas{height:520px;min-width:2050px;position:relative;background:linear-gradient(180deg,#EAF6FF 0%,#F8FBFD 42%,#F1F4F5 42%,#F1F4F5 100%)}.ground{position:absolute;left:0;right:0;bottom:0;height:180px;background:linear-gradient(180deg,#E6D7BA,#D7C2A0);border-top:1px solid var(--line)}.cts{position:absolute;left:30px;bottom:105px;display:flex;gap:12px;align-items:flex-end}.ct{width:125px;height:330px;position:relative;flex:0 0 auto}.ct button{position:absolute;left:0;bottom:0;width:116px;height:260px;border:0;background:transparent}.ct button:hover{transform:translateY(-7px)}.badgeRow{position:absolute;top:-42px;left:50%;transform:translateX(-50%);display:flex;gap:6px;justify-content:center;width:180px;flex-wrap:wrap}.useBadge{border:1px solid;border-radius:99px;padding:6px 9px;font-size:11px;font-weight:800;background:#fff;box-shadow:0 4px 8px rgba(0,0,0,.08);white-space:nowrap}.face{position:absolute;inset:0;border:1px solid #C8D2D7;border-radius:8px 8px 4px 4px;background:linear-gradient(90deg,#fff,#F1F5F7,#fff);overflow:hidden;box-shadow:0 8px 16px rgba(0,0,0,.09)}.ct.active .face{border:2px solid var(--navy)}.topbar{position:absolute;left:0;right:0;top:0;height:16px;background:#E8EDF0;border-bottom:1px solid #D4DEE3}.rib{position:absolute;top:16px;bottom:20px;width:2px;background:#D9E2E6}.num{position:absolute;left:8px;top:28px;background:#fff;border:1px solid #D4DEE3;border-radius:4px;padding:2px 6px;font-size:12px;font-weight:900}.vent{position:absolute;width:32px;height:34px;background:#1E2429;border:1px solid #CAD6DC;border-radius:3px}.vent:before,.vent:after{content:"";position:absolute;background:rgba(255,255,255,.16)}.vent:before{left:5px;right:5px;top:50%;height:2px}.vent:after{top:5px;bottom:5px;left:50%;width:2px}.centerbar{position:absolute;left:56px;top:70px;bottom:34px;width:2px;background:#BFCBD1}.handle{position:absolute;left:50px;top:122px;width:20px;height:16px;border:2px solid #B9C6CC;border-radius:99px}.statusdot{position:absolute;right:8px;top:32px;width:12px;height:12px;border-radius:99px}.foot{position:absolute;left:5px;right:5px;bottom:8px;border:1px solid var(--line);border-radius:10px;background:rgba(255,255,255,.98);padding:7px;font-size:10px;font-weight:800;color:var(--muted)}.footTop{display:flex;justify-content:space-between;margin-bottom:5px}.bar{height:5px;background:#DCE5E9;border-radius:99px;overflow:hidden}.bar span{display:block;height:100%;border-radius:99px}.pct{text-align:right;color:var(--text);font-size:9px;margin-top:2px}.pop{display:none;position:absolute;left:50%;top:0;transform:translate(-50%,-103%);width:280px;background:#fff;border:1px solid var(--line);border-radius:14px;padding:12px;box-shadow:0 16px 35px rgba(0,0,0,.16);z-index:8}.ct:hover .pop{display:block}.popgrid{display:grid;grid-template-columns:1fr 1fr;gap:6px}.mini{border:1px solid var(--line);border-radius:10px;padding:7px}.mini small{display:block;color:var(--muted);font-size:9px;font-weight:800}.mini b{font-size:10px;display:block;margin-top:3px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    .layout{display:grid;grid-template-columns:300px minmax(0,1fr);gap:20px}.side{padding:16px}.ctitem{border:1px solid var(--line);border-radius:14px;margin-bottom:8px;padding:10px}.ctitem.active{border-color:var(--navy);box-shadow:0 0 0 2px rgba(7,53,74,.12)}.ctitem button{width:100%;border:0;background:transparent;text-align:left;font-weight:700}.selected{padding:18px}.selHead{display:flex;justify-content:space-between;gap:12px;border-bottom:1px solid var(--line);padding-bottom:14px;margin-bottom:14px}.chip{border-radius:99px;padding:6px 10px;background:#EEF5F8;color:var(--navy);font-size:12px;font-weight:800}.inner{border:1px solid var(--line);border-radius:20px;padding:16px;background:linear-gradient(180deg,#fff,#F4F8FA)}.posgrid{display:grid;grid-template-columns:repeat(4,1fr);gap:12px}.tower{border:1px solid var(--line);border-radius:14px;background:#fff;padding:10px}.towerVis{height:126px;border:1px solid var(--line);border-radius:10px;background:var(--soft);display:flex;align-items:center;justify-content:center;overflow:hidden}.towerTop{display:flex;justify-content:space-between;font-weight:800;margin-bottom:8px}.dot{width:12px;height:12px;border-radius:50%}.towerInfo{display:grid;grid-template-columns:1fr 1fr;gap:3px;font-size:11px;margin-top:8px}.towerInfo span{color:var(--muted)}.towerInfo b{text-align:right;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}.forms{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-top:16px}.editors{display:grid;grid-template-columns:1fr 1fr;gap:14px}.editor{padding:14px}.fg{display:grid;grid-template-columns:repeat(3,1fr);gap:10px}.pallet{height:116px;width:56px;display:flex;flex-direction:column-reverse;gap:2px;position:relative}.palletBase{height:14px;flex:0 0 auto}.palletBase .top{height:5px;background:#C9B89E;border-radius:2px}.feet{display:grid;grid-template-columns:repeat(3,1fr);gap:3px;margin-top:3px}.feet i{height:6px;background:#9A876E;border-radius:2px}.box{height:7px;background:var(--black);border-radius:3px;position:relative}.box:before,.box:after{content:"";position:absolute;width:5px;top:0;height:100%;background:var(--blue)}.box:before{left:0}.box:after{right:0}.mat{height:7px;display:grid;grid-template-columns:repeat(10,1fr);gap:1px}.mat i{background:#11181D;border-radius:1px}.empty{height:34px;border:1px dashed #C9D3D8;border-radius:10px;color:#8A96A0;display:flex;align-items:center;justify-content:center;font-size:10px}.count{position:absolute;right:-3px;top:-10px;background:#fff;border:1px solid var(--line);border-radius:99px;padding:2px 6px;font-size:10px;font-weight:900;color:var(--navy)}.report{padding:26px}.reportHead{display:flex;justify-content:space-between;border-bottom:1px solid var(--line);padding-bottom:18px;margin-bottom:18px}.reportContainer{border:1px solid var(--line);border-radius:18px;padding:14px;margin-top:16px;break-inside:avoid}.table{width:100%;border-collapse:collapse;font-size:12px}.table th,.table td{border-top:1px solid var(--line);padding:7px;text-align:left}.table th{background:var(--soft);border-top:0}.fullscreen{position:fixed!important;inset:12px;z-index:9999;background:#fff;overflow:auto}
    @media(max-width:1100px){.metrics{grid-template-columns:repeat(2,1fr)}.controls,.layout{grid-template-columns:1fr}.forms{grid-template-columns:1fr}.editors{grid-template-columns:1fr}.posgrid{grid-template-columns:repeat(2,1fr)}}

<body><div id="app"></div><script>
const POS=[1,2,3,4,5,6,7,8], KEY='buzzfly_bsf_teste_v2', C=Array.from({length:17},(_,i)=>({id:`CT-${i+1}`,number:String(i+1),name:`CT ${i+1}`}));let state=load(),date=today(),sel=state.containers[0].id,page='gestao';
function today(){return new Date().toISOString().slice(0,10)}function br(v){let [y,m,d]=v.split('-');return `${d}/${m}/${y}`}function load(){try{let s=JSON.parse(localStorage.getItem(KEY)||'null');if(s)return s}catch{}let s={containers:C,dailyReviews:[]};localStorage.setItem(KEY,JSON.stringify(s));return s}function save(){localStorage.setItem(KEY,JSON.stringify(state))}function ep(p){return{position:p,lote:'',caixas:'',dietaKgPorCaixa:'',uso:'Produção',status:'OK',observacoes:''}}function ec(c){return{containerId:c.id,ct:c.number,name:c.name,ventilacao:'Manual',recirculacao:'OFF',setpoint:'',observacoesGerais:'',positions:POS.map(ep)}}function cur(){return state.dailyReviews.find(r=>r.date===date)||null}function latest(){return[...state.dailyReviews].sort((a,b)=>b.date.localeCompare(a.date))[0]||null}function scr(){let r=cur();return r?.containers.find(c=>c.containerId===sel)||r?.containers[0]||null}function tot(c){return c.positions.reduce((a,p)=>{let cx=+p.caixas||0,kg=+p.dietaKgPorCaixa||0,use=p.status!='Vazio'&&(p.lote||cx>0);a.boxes+=cx;a.dietKg+=cx*kg;if(use)a.filled++;if(p.status=='Crítico')a.critical++;if(p.status=='Atenção')a.attention++;if(['Produção','Engorda'].includes(p.uso))a.fatteningBoxes+=cx;if(p.uso=='Maternidade')a.maternityBoxes+=cx;if(p.uso=='Colônia')a.colonyBoxes+=cx;return a},{boxes:0,dietKg:0,filled:0,critical:0,attention:0,fatteningBoxes:0,maternityBoxes:0,colonyBoxes:0})}function daytot(r=cur()){let a={boxes:0,dietKg:0,filledPositions:0,totalPositions:(r?.containers.length||17)*8,critical:0,attention:0,fatteningBoxes:0,maternityBoxes:0};r?.containers.forEach(c=>{let t=tot(c);a.boxes+=t.boxes;a.dietKg+=t.dietKg;a.filledPositions+=t.filled;a.critical+=t.critical;a.attention+=t.attention;a.fatteningBoxes+=t.fatteningBoxes;a.maternityBoxes+=t.maternityBoxes});a.occupancyRate=a.totalPositions?Math.round(a.filledPositions/a.totalPositions*100):0;return a}function createDay(){if(cur())return;state.dailyReviews=[{id:crypto.randomUUID(),date,responsavel:'',containers:state.containers.map(ec)},...state.dailyReviews];save();render()}function copyDay(){if(cur())return alert('Já existe revisão para esta data.');let p=[...state.dailyReviews].filter(r=>r.date<date).sort((a,b)=>b.date.localeCompare(a.date))[0];if(!p)return alert('Não há revisão anterior.');let m=new Map(p.containers.map(c=>[c.containerId,c]));state.dailyReviews=[{id:crypto.randomUUID(),date,responsavel:p.responsavel||'',containers:state.containers.map(c=>m.get(c.id)?{...JSON.parse(JSON.stringify(m.get(c.id))),ct:c.number,name:c.name}:ec(c))},...state.dailyReviews];save();render()}function upd(fn){let r=cur();if(!r)return;state.dailyReviews=state.dailyReviews.map(x=>{if(x.id!=r.id)return x;let n=JSON.parse(JSON.stringify(x));fn(n);return n});save();render()}function updCt(f,v){upd(d=>{let c=d.containers.find(x=>x.containerId==sel);c[f]=v})}function updPos(i,f,v){upd(d=>{let c=d.containers.find(x=>x.containerId==sel),p=c.positions[i];if(f=='caixas'){let max=p.uso=='Maternidade'?150:15;p.caixas=v===''?'':String(Math.max(0,Math.min(max,+v||0)))}else{p[f]=v;if(f=='uso'){let max=v=='Maternidade'?150:15;if((+p.caixas||0)>max)p.caixas=String(max)}if((f=='status'&&v=='Vazio')||(f=='uso'&&v=='Vazio'))Object.assign(p,{uso:'Vazio',status:'Vazio',lote:'',caixas:'',dietaKgPorCaixa:''})}})}function stColor(s){return s=='Crítico'?'#B83232':s=='Atenção'?'#C98716':s=='Vazio'?'#8A96A0':'#2F7D4D'}function norm(u){return u=='Maternidade'?'Maternidade':u=='Colônia'?'Colônia':u=='Vazio'?'Vazio':'Produção'}function badges(c){let b={Produção:0,Colônia:0,Maternidade:0};c.positions.forEach(p=>{let n=norm(p.uso),cx=+p.caixas||0;if(n!='Vazio'&&cx)b[n]+=cx});let out=[];if(b.Produção)out.push(['Produção',b.Produção,'#FFF7D6','#8A6A00','#F2DE8A']);if(b.Colônia)out.push(['Colônia',b.Colônia,'#F1F3F5','#1F2933','#D4DADF']);if(b.Maternidade)out.push(['Maternidade',b.Maternidade,'#FDEDF3','#A64D6C','#F4BDD3']);if(!out.length)out=[['Vazio',0,'#F1F5F7','#8A96A0','#D8E1E6']];return out.sort((a,b)=>b[1]-a[1]).slice(0,2)}function safe(v){return String(v??'').replaceAll('&','&amp;').replaceAll('<','&lt;').replaceAll('"','&quot;')}function opts(a,v){return a.map(x=>`<option ${x==v?'selected':''}>${x}</option>`).join('')}function metric(l,v,s=''){return`<div class="metric"><small>${l}</small><b>${v}</b>${s?`<small>${s}</small>`:''}</div>`}function mini(l,v){return`<div class="mini"><small>${l}</small><b>${v}</b></div>`}
function render(){let r=cur(),l=latest(),sc=scr(),dt=daytot(r);app.innerHTML=`<div class="wrap stack"><header class="card"><div><div class="logo">buzz fly</div><h1>Sistema de Gestão e Controle da Criação - BSF</h1><p class="muted">Controle geral dos containers de criação - BSF.</p></div><button class="btn primary" onclick="pdf()" ${!r?'disabled':''}>Baixar PDF do dia</button></header><div class="card tabs"><div><b>Fluxo do sistema</b></div><div class="row"><button class="tab ${page=='gestao'?'active':''}" onclick="page='gestao';render()">Página 1 · Gestão</button><button class="tab ${page=='relatorio'?'active':''}" onclick="page='relatorio';render()">Página 2 · Relatório</button></div></div>${page=='gestao'?gestao(r,l,sc,dt):relPage(r,dt)}</div>`}function gestao(r,l,sc,dt){return`<div class="stack"><section class="card controls grid"><label><span>Data operacional</span><input type="date" value="${date}" onchange="date=this.value;render()"></label><div><button class="btn" onclick="createDay()">Criar dia vazio</button> <button class="btn primary" onclick="copyDay()">Copiar última data</button></div><label><span>Responsável</span><input ${!r?'disabled':''} value="${safe(r?.responsavel||'')}" onchange="upd(d=>d.responsavel=this.value)"></label>${!r?`<div class="notice">Crie um dia vazio ou copie a última data para começar.</div>`:''}</section>${r?`<section class="grid metrics">${metric('Containers',r.containers.length)}${metric('Ocupação',dt.occupancyRate+'%',dt.filledPositions+'/'+dt.totalPositions)}${metric('Caixas totais',dt.boxes)}${metric('Dieta',dt.dietKg.toFixed(1)+' kg')}${metric('Engorda',dt.fatteningBoxes)}${metric('Maternidade',dt.maternityBoxes)}${metric('Atenção',dt.attention)}${metric('Críticas',dt.critical)}</section>`:''}${l?yard(l):''}<div class="layout"><aside class="card side"><h3>Containers</h3>${state.containers.map(c=>{let dc=r?.containers.find(x=>x.containerId==c.id),t=dc?tot(dc):null;return`<div class="ctitem ${sel==c.id?'active':''}"><button onclick="sel='${c.id}';render()">${c.name}${t?`<br><small class="muted">${t.boxes} cx · ${t.attention} atenção · ${t.critical} crítico</small>`:''}</button></div>`}).join('')}<h3>Histórico</h3>${state.dailyReviews.map(x=>`<div class="ctitem ${x.date==date?'active':''}"><button onclick="date='${x.date}';render()">${br(x.date)}<br><small class="muted">${x.containers.length} CTs</small></button></div>`).join('')||'<p class="muted">Sem revisões.</p>'}</aside><main class="stack">${sc&&r?selected(sc,r):'<div class="card selected">Crie ou selecione uma revisão diária.</div>'}</main></div></div>`}
function yard(r){return`<section id="yard" class="card yard"><div class="yardHead"><div><b>Visual operacional</b><h2 style="margin:4px 0">Pátio dos containers</h2><p class="muted">Última atualização: ${br(r.date)}</p></div><button class="btn" onclick="yard.classList.toggle('fullscreen')">⛶ Tela cheia</button></div><div class="yardWrap"><div class="yardScroll"><div class="yardCanvas"><div class="ground"></div><div class="cts">${r.containers.map(ctHtml).join('')}</div></div></div></div></section>`}function ctHtml(c,i){let t=tot(c),occ=Math.round(t.filled/8*100),color=occ==100?'#B83232':occ>=75?'#2F7D4D':occ>=40?'#C98716':'#E4572E',stat=t.critical?'Crítico':t.attention?'Atenção':t.filled?'OK':'Vazio';return`<div class="ct ${sel==c.containerId?'active':''}"><div class="pop"><div style="display:flex;justify-content:space-between;margin-bottom:8px"><b>${c.name}</b><span style="color:${stColor(stat)};font-size:11px;font-weight:800">${stat}</span></div><div class="popgrid">${mini('Caixas',t.boxes)}${mini('Posições',t.filled+'/8')}${mini('Ocupação',occ+'%')}${mini('Dieta',t.dietKg.toFixed(1)+' kg')}${mini('Engorda',t.fatteningBoxes+' cx')}${mini('Mater.',t.maternityBoxes+' cx')}${mini('Vent.',c.ventilacao)}${mini('Recirc.',c.recirculacao)}${mini('Setpoint',(c.setpoint||'-')+' °C')}${mini('Alertas',t.attention+'/'+t.critical)}</div></div><button onclick="sel='${c.containerId}';date='${r.date}';render()"><div class="badgeRow">${badges(c).map(b=>`<span class="useBadge" style="background:${b[2]};color:${b[3]};border-color:${b[4]}">${b[0]}</span>`).join('')}</div><div class="face"><div class="topbar"></div>${[0,1,2,3,4,5,6].map(k=>`<div class="rib" style="left:${12+k*17}px"></div>`).join('')}<div class="num">${String(c.ct||i+1).padStart(2,'0')}</div><div class="vent" style="left:18px;top:82px"></div><div class="vent" style="left:18px;top:146px"></div><div class="vent" style="left:74px;top:82px"></div><div class="vent" style="left:74px;top:146px"></div><div class="centerbar"></div><div class="handle"></div><div class="statusdot" style="background:${stColor(stat)}"></div></div><div class="foot"><div class="footTop"><span>${c.name}</span><span>${t.filled}/8</span></div><div class="bar"><span style="width:${occ}%;background:${color}"></span></div><div class="pct">${occ}%</div></div></button></div>`}
function selected(c,r){let t=tot(c);return`<section class="card selected"><div class="selHead"><div><b>Container selecionado</b><h2>${c.name} — ${br(r.date)}</h2></div><div class="row"><span class="chip">${t.boxes} caixas</span><span class="chip">${t.dietKg.toFixed(1)} kg dieta</span><button class="btn" onclick="reset()">Zerar container</button></div></div><div class="inner"><div class="posgrid">${[0,2,4,6,1,3,5,7].map(i=>tower(c.positions[i])).join('')}</div></div><div class="forms"><label><span>Ventilação</span><select onchange="updCt('ventilacao',this.value)">${opts(['Manual','Automático'],c.ventilacao)}</select></label><label><span>Recirculação</span><select onchange="updCt('recirculacao',this.value)">${opts(['OFF','ON'],c.recirculacao)}</select></label><label><span>Setpoint °C</span><input value="${safe(c.setpoint)}" onchange="updCt('setpoint',this.value)"></label><label><span>Observação geral</span><input value="${safe(c.observacoesGerais)}" onchange="updCt('observacoesGerais',this.value)"></label></div></section><section class="editors">${c.positions.map((p,i)=>editor(p,i)).join('')}</section>`}function tower(p){let dt=((+p.caixas||0)*(+p.dietaKgPorCaixa||0)).toFixed(1);return`<div class="tower"><div class="towerTop"><span>P${p.position}</span><span class="dot" style="background:${stColor(p.status)}"></span></div><div class="towerVis">${pallet(p.caixas,p.uso)}</div><div class="towerInfo"><span>Lote</span><b>${p.lote||'-'}</b><span>Cx</span><b>${p.caixas||'-'}</b><span>Dieta</span><b>${dt} kg</b></div></div>`}function pallet(cx,uso){let count=+cx||0,mat=uso=='Maternidade',lev=Math.min(mat?Math.ceil(count/10):count,8);return`<div class="pallet">${count?`<div class="count">${count} cx</div>`:''}<div class="palletBase"><div class="top"></div><div class="feet"><i></i><i></i><i></i></div></div>${lev?Array.from({length:lev}).map(()=>mat?`<div class="mat">${'<i></i>'.repeat(10)}</div>`:'<div class="box"></div>').join(''):'<div class="empty">vazio</div>'}</div>`}function editor(p,i){return`<div class="card editor"><h3>Posição ${p.position}</h3><div class="towerVis">${pallet(p.caixas,p.uso)}</div><div class="fg"><label><span>Lote</span><input value="${safe(p.lote)}" onchange="updPos(${i},'lote',this.value)"></label><label><span>Caixas</span><input type="number" value="${safe(p.caixas)}" onchange="updPos(${i},'caixas',this.value)"></label><label><span>Dieta/caixa</span><input type="number" step="0.1" value="${safe(p.dietaKgPorCaixa)}" onchange="updPos(${i},'dietaKgPorCaixa',this.value)"></label></div><div class="fg" style="grid-template-columns:1fr 1fr"><label><span>Uso</span><select onchange="updPos(${i},'uso',this.value)">${opts(['Produção','Colônia','Maternidade','Vazio'],p.uso)}</select></label><label><span>Status</span><select onchange="updPos(${i},'status',this.value)">${opts(['OK','Atenção','Crítico','Vazio'],p.status)}</select></label></div><label><span>Observações</span><textarea onchange="updPos(${i},'observacoes',this.value)">${safe(p.observacoes)}</textarea></label></div>`}function reset(){let c=scr();if(!confirm('Zerar '+c.name+'?'))return;upd(d=>{let x=d.containers.find(a=>a.containerId==sel);x.positions=POS.map(p=>({...ep(p),uso:'Vazio',status:'Vazio'}));x.observacoesGerais=''})}function relPage(r,dt){return`<section class="card report"><div class="selHead"><div><b>Relatório consolidado</b><h2>Relatório do dia</h2></div><button class="btn primary" onclick="pdf()" ${!r?'disabled':''}>Baixar PDF do dia</button></div>${r?report(r,dt):'<div class="notice">Crie uma revisão diária.</div>'}</section>`}function report(r,dt){return`<section id="daily-report"><div class="reportHead"><div><div class="logo" style="font-size:25px">buzz fly</div><h2>Relatório Diário Consolidado — Containers BSF</h2></div><div style="text-align:right"><p>Data operacional</p><h2>${br(r.date)}</h2><p>Responsável: ${r.responsavel||'-'}</p></div></div><div class="grid metrics">${metric('Containers',r.containers.length)}${metric('Ocupação',dt.occupancyRate+'%',dt.filledPositions+'/'+dt.totalPositions)}${metric('Caixas',dt.boxes)}${metric('Dieta',dt.dietKg.toFixed(1)+' kg')}${metric('Engorda',dt.fatteningBoxes)}${metric('Maternidade',dt.maternityBoxes)}${metric('Atenção',dt.attention)}${metric('Críticas',dt.critical)}</div>${r.containers.map(c=>{let t=tot(c);return`<div class="reportContainer"><h3>${c.name}</h3><div class="row"><span class="chip">Vent.: ${c.ventilacao}</span><span class="chip">Recirc.: ${c.recirculacao}</span><span class="chip">Setpoint: ${c.setpoint||'-'} °C</span><span class="chip">${t.boxes} caixas</span><span class="chip">${t.dietKg.toFixed(1)} kg dieta</span></div><table class="table"><thead><tr><th>Pos.</th><th>Lote</th><th>Caixas</th><th>Dieta/caixa</th><th>Dieta total</th><th>Uso</th><th>Status</th><th>Obs.</th></tr></thead><tbody>${c.positions.map(p=>`<tr><td>${p.position}</td><td>${p.lote||'-'}</td><td>${p.caixas||'-'}</td><td>${p.dietaKgPorCaixa||'-'}</td><td>${((+p.caixas||0)*(+p.dietaKgPorCaixa||0)).toFixed(1)} kg</td><td>${p.uso}</td><td>${p.status}</td><td>${p.observacoes||'-'}</td></tr>`).join('')}</tbody></table></div>`}).join('')}</section>`}function pdf(){let r=cur();if(!r)return;if(page!='relatorio'){page='relatorio';render()}setTimeout(()=>html2pdf().set({margin:8,filename:`relatorio-diario-buzzfly-bsf-${r.date}.pdf`,image:{type:'jpeg',quality:.98},html2canvas:{scale:2,backgroundColor:'#fff'},jsPDF:{unit:'mm',format:'a4',orientation:'portrait'}}).from(document.getElementById('daily-report')).save(),50)}render();
</script></body></html>
